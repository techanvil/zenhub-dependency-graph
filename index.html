<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>ZDG</title>
    <script defer src="/js/svg-pan-zoom.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
      // Prevents flash of wrong theme on load.
      // Reads the user preference and Chakra's resolved color mode from localStorage.
      (function() {
        var pref;
        try { pref = JSON.parse(localStorage.getItem("colorModePreference")); } catch(e) {}
        var mode = pref || "system";
        if (mode === "system") {
          mode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        var cl = document.documentElement.classList;
        cl.add(mode === "dark" ? "chakra-ui-dark" : "chakra-ui-light");
        document.documentElement.setAttribute("data-theme", mode);
        document.documentElement.style.colorScheme = mode;
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
